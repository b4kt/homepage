<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Freedom Project</title>
    <style>
      @font-face {
        font-family: "cprime";
        src: url("cprime.ttf") format("truetype");
      }

      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
        padding: 0;
        background-color: #000;
        color: #39ff14;
        overflow: hidden;
      }

      body {
        font-family: "cprime", Arial, sans-serif;
        line-height: 1.6;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }

      .container {
        background: rgba(17, 17, 17, 0.85);
        border: 2px solid #39ff14;
        border-radius: 15px;
        padding: 2.5rem 3rem;
        max-width: 700px;
        width: 90%;
        box-shadow: 0 0 20px #39ff14;
        text-align: center;
      }

      p {
        font-family: "cprime", monospace;
        font-size: 1.1rem;
        color: #39ff14;
        text-shadow: 0 0 4px rgba(57, 255, 20, 0.6);
        line-height: 1.6;
      }

      a {
        color: #c0ffc0;
        text-shadow: 0 0 5px #c0ffc0;
        text-decoration: none;
      }

      a:hover {
        text-shadow: 0 0 10px #c0ffc0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <p>
        This page is no longer active, for up to date links, join the discord,
        the main site is <a href="https://0xdc.icu">0xdc.icu</a>, that website
        will never go down. A new link dispenser is in the works.
      </p>
    </div>
  </body>
</html>
